name: Deploy to Firebase Hosting

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build
        env:
          NITRO_PRESET: static
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Generate index.html
        run: |
          JS1=$(ls dist/client/assets/index-*.js | head -1 | sed 's|dist/client||')
          JS2=$(ls dist/client/assets/index-*.js | tail -1 | sed 's|dist/client||')
          CSS=$(ls dist/client/assets/styles-*.css | sed 's|dist/client||')
          cat > dist/client/index.html << HTML
          <!DOCTYPE html>
          <html lang="uk">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>КПК — Тактичний термінал</title>
              <link rel="stylesheet" crossorigin href="${CSS}">
              <script type="module" crossorigin src="${JS1}"></script>
              <script type="module" crossorigin src="${JS2}"></script>
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          HTML

      - name: Write service account key
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp-key.json

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v14.18.0
        with:
          args: deploy --only hosting --project kpk-1-caa5a
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /github/workspace/gcp-key.json
