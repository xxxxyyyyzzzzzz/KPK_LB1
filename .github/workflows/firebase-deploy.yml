name: Deploy to Firebase Hosting

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build
        env:
          NITRO_PRESET: static
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Show build output
        run: |
          echo "=== .output ===" && ls -la .output/ 2>/dev/null || echo "немає .output"
          echo "=== dist ===" && ls -la dist/ 2>/dev/null || echo "немає dist"
          echo "=== .output/public ===" && ls -la .output/public/ 2>/dev/null || echo "немає .output/public"

      - name: Write service account key
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp-key.json

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v14.18.0
        with:
          args: deploy --only hosting --project kpk-1-caa5a
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /github/workspace/gcp-key.json
